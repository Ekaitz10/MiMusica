<html>
<head>
	<title>MiMusica</title>
	<meta charset="UTF-8">
	<!-- CSS only -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
	<!-- JavaScript Bundle with Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>
<body class="bg-dark text-light container-fluid p-0">
	<nav class="navbar navbar-light bg-light">
	  <div class="container-fluid">
	    <a class="navbar-brand" th:href="@{/perfil}">MiMusica</a>
	  </div>
	</nav>
	<div class="row p-0 pt-5 m-0">
		<div class="col-12">
			<h3 class="text-center" th:text="${playlist.nombre}"></h3>
		</div>
	</div>
	<div class="row p-0 pt-5 m-0">
		<div class="col-8">
		<ul class="list-group list-group-flush">
			<li th:each="cancion : ${cancionesplaylist}" class="list-group-item d-flex justify-content-between align-items-center">
				<p th:text="${cancion.titulo}"></p>
				<form>
					<button class="btn btn-danger">Quitar</button>
				</form>
		  	</li>
		  	<div th:if="${canciones} == null">
		  	<p class="text-center text-muted">No hay canciones en la playlist</p>
		  	</div>
		</ul>
		</div>
		<div class="col-4">
			<div class="row">
				<div col="col-12">
					<form method="POST" action="/crearartista">
						<div class="mb-3">
						    <label class="form-label">Nuevo artista</label>
						    <input type="text" class="form-control mb-3" name="nombre" placeholder="nombre">
						    <input type="text" class="form-control mb-3" name="nacionalidad" placeholder="nacionalidad">
						    <input type="text" class="form-control mb-3" name="genero" placeholder="genero">
						 </div>
						 <input type="submit" class="btn btn-success col-12" value="Crear">
					</form>
				</div>
			</div>
			<div class="row">
				<div col="col-12">
					<form method="POST" action="/crearcancion">
						<div class="mb-3">
						    <label class="form-label">Nueva Cancion</label>
						    <input type="text" class="form-control mb-3" name="titulo" placeholder="titulo">
						    <select class="form-control me-2" name="artista">
								<option  th:each="artista : ${artistas}" th:text="${artista.nombre}"></option>
							</select>
						 </div>
						 <input type="submit" class="btn btn-success col-12" value="Crear">
					</form>
				</div>
			</div>
			<div class="row">
				<div col="col-12">
					<form method="POST" action="/crearcancionplaylist">
						<div class="mb-3">
						    <label class="form-label">Añadir a la Playlist</label>
							<select class="form-control me-2" name="titulo">
								<option  th:each="cancion : ${canciones}" th:text="${cancion.titulo}"></option>
							</select>
						 </div>
						 <input type="submit" class="btn btn-success col-12" value="Añadir">
					</form>
				</div>
			</div>
		</div>
	</div>
</html>
